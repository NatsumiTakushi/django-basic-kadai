{% extends "base.html" %}

{% block title %}商品詳細{% endblock %}
{% block content %}
<h1>商品詳細</h1>

<table class="table table-striped table-hover table-bordered">
   <thead>
       <tr>
           <th>カテゴリ</th>
           <th>商品画像</th>
           <th>商品詳細の説明</th>
       </tr>
   </thead>
   <tbody>
       <tr>
           <td>{{ object.category }}</td>
           <td><img src="{{ object.image.url }}" alt="{{ object.name }}" class="img-thumbnail"></td>
           <td>{{ object.description }}</td>
       </tr>
   </tbody>
</table>
<a href="{% url 'list' %}">戻る</a>
{% endblock %}
